# ============================================================
#  Harvest Savior — Spring Boot Application Configuration
# ============================================================

# ── Server ──────────────────────────────────────────────────
server.port=8080

# Application name (useful in logs and Spring Actuator)
spring.application.name=harvest-savior-server

# ── H2 In-Memory Database ───────────────────────────────────
# H2 requires no installation. The database lives in RAM and
# resets every time the application restarts (good for development).
#
# TO SWITCH TO MYSQL LATER, comment out the H2 block and
# uncomment the MySQL block at the bottom of this file.

spring.datasource.url=jdbc:h2:mem:harvestsaviordb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 browser console — visit http://localhost:8080/h2-console while the app runs
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA / Hibernate ─────────────────────────────────────────
# "create-drop" → Hibernate creates tables on startup and drops them on shutdown.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ── File Upload ─────────────────────────────────────────────
# Maximum size for an uploaded leaf image
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Flask Microservice URL ───────────────────────────────────
flask.base-url=http://localhost:5000

# ── Thymeleaf ───────────────────────────────────────────────
# Disabling cache during development so template changes are visible immediately
spring.thymeleaf.cache=false

# ============================================================
#  PRODUCTION / MySQL — uncomment these and delete H2 block
#  when you are ready to deploy with a real database.
# ============================================================
